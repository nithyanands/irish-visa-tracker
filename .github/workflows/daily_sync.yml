name: Daily ODS Sync

on:
  schedule:
    # 11:30 IST = 06:00 UTC, Mon–Fri (embassy publishes by ~11am IST)
    - cron: '0 6 * * 1-5'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pandas odfpy openpyxl beautifulsoup4 supabase

      - name: Run daily sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python daily_sync.py

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-${{ github.run_id }}
          path: sync_log.txt
          retention-days: 30
